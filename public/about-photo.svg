  <!-- Beak (lower) -->
  <path d="M50,86 Q34,90 32,94 Q44,94 52,90 Z" fill="#ea580c"/>

  <!-- Eye -->
  <circle cx="64" cy="70" r="6" fill="white"/>
  <circle cx="64" cy="71" r="4" fill="#1e3a8a"/>
  <circle cx="65.5" cy="69.5" r="1.5" fill="white"/>

  <!-- Water ripples -->
  <ellipse cx="55" cy="178" rx="18" ry="2.5" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <ellipse cx="135" cy="180" rx="22" ry="2.5" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <ellipse cx="100" cy="186" rx="14" ry="2" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
