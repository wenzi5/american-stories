<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#dbeafe"/>

  <!-- Ears -->
  <polygon points="45,75 60,30 80,70" fill="#93c5fd"/>
  <polygon points="120,70 140,30 155,75" fill="#93c5fd"/>
  <!-- Inner ears -->
  <polygon points="50,70 61,42 74,68" fill="#fbcfe8"/>
  <polygon points="126,68 139,42 150,70" fill="#fbcfe8"/>

  <!-- Head -->
  <ellipse cx="100" cy="115" rx="58" ry="52" fill="#bfdbfe"/>

  <!-- Eyes -->
  <ellipse cx="80" cy="105" rx="10" ry="11" fill="white"/>
  <ellipse cx="120" cy="105" rx="10" ry="11" fill="white"/>
  <ellipse cx="80" cy="107" rx="6" ry="7" fill="#1e3a8a"/>
  <ellipse cx="120" cy="107" rx="6" ry="7" fill="#1e3a8a"/>
  <!-- Pupils shine -->
  <circle cx="83" cy="104" r="2" fill="white"/>
  <circle cx="123" cy="104" r="2" fill="white"/>

  <!-- Nose -->
  <polygon points="100,120 95,127 105,127" fill="#f9a8d4"/>

  <!-- Mouth -->
  <path d="M95,127 Q100,133 105,127" stroke="#1e40af" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="42" y1="118" x2="88" y2="122" stroke="#1e40af" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="42" y1="126" x2="88" y2="126" stroke="#1e40af" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="42" y1="134" x2="88" y2="130" stroke="#1e40af" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

  <!-- Whiskers right -->
  <line x1="112" y1="122" x2="158" y2="118" stroke="#1e40af" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="112" y1="126" x2="158" y2="126" stroke="#1e40af" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="112" y1="130" x2="158" y2="134" stroke="#1e40af" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
</svg>
