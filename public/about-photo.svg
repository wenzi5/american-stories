<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#dbeafe"/>

  <!-- Tail feathers -->
  <path d="M158,118 Q178,108 174,128 Q168,120 158,130 Z" fill="#f59e0b"/>

  <!-- Body -->
  <ellipse cx="112" cy="128" rx="52" ry="40" fill="#fcd34d"/>

  <!-- Wing -->
  <path d="M88,118 Q120,110 138,128 Q120,140 92,138 Q85,128 88,118 Z" fill="#f59e0b" opacity="0.85"/>
  <path d="M105,123 Q120,121 130,128" stroke="#d97706" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M100,128 Q118,127 130,133" stroke="#d97706" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- Neck -->
  <ellipse cx="78" cy="100" rx="18" ry="22" fill="#fcd34d"/>

  <!-- Head -->
  <circle cx="68" cy="78" r="32" fill="#fcd34d"/>

  <!-- Cheek blush -->
